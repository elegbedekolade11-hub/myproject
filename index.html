<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project 0.1 - Table</title>
  <style>
    table, th, td {
      border: 1px solid black;
      border-collapse: collapse;
      padding: 8px;
      text-align: left;
    }
    table {
      width: 100%;
      margin: 20px auto;
    }
    h1, h2 {
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>Welcome to Mywebsite</h1>
  <h2>This is an example of table</h2>

  <table>
    <tr>
      <th colspan="3">Computer courses</th>
    </tr>
    <tr>
      <td rowspan="3"><b>Courses</b></td>
      <td>CCC</td>
      <td>3 Months</td>
    </tr>
    <tr>
      <td>MCAD</td>
      <td>6 Months</td>
    </tr>
    <tr>
      <td>Graphic Design</td>
      <td>3 Months</td>
    </tr>
    <tr>
      <th colspan="3">Long term courses</th>
    </tr>
    <tr>
      <td rowspan="2"><b>Courses</b></td>
      <td>B Level</td>
      <td>1 year</td>
    </tr>
    <tr>
      <td>BCA</td>
      <td>3 years</td>
    </tr>
  </table>

</body>
</html>
